<div id="mainView">

<script>
// ── DATA ────────────────────────────────────────────────────────────────

//   detail: longer explanation (optional)
//   affectedDashboards: array of strings (optional)

const DATA = {
    lastUpdated: "2026-07-17T09:00:00",
    recentUpdates: [
        {

        {

    ],
    dataIssues: [
        {
            severity: "high",
            title: "Shopify session tracking: under-recording and channel misattribution",
            detail: "Dept are auditing our tracking setup and will recommend actions to improve accuracy.",
            body: "Our investigation into post-migration session data has identified two potential separate issues with how Shopify records website visits. These may be linked to limitations of Shopify's tracking technology, rather than errors in our data pipeline.\n\nIssue 1: Sessions look much lower than expected, and compared to pre migration\n\nRecorded sessions dropped from ~34,000/day before the migration to ~16,000/day after. We don't know yet if this is actually a real material drop or an issue with how events are being tracked on Shopify - ad platforms (Meta, Google, TikTok) confirm the same number of clicks and the same spend as before migration. The visits are therefore likey happening, but Shopify's tracking is may be unable to see many of them.\n\nOne potential reason is that Shopify tracks visits using a browser-based script that is vulnerable to being blocked. Three things commonly block it:\n\n• Ad blockers - widely used browser extensions that block tracking scripts\n• Privacy features in Safari and Firefox - these browsers restrict the type of tracking Shopify uses\n• In-app browsers - when someone taps a link inside Instagram, Facebook, or TikTok, the built-in browser often blocks tracking entirely. This is particularly impactful because paid social traffic predominantly arrives this way\n\nPaid social is the hardest hit channel: only ~27% of paid social clicks are being recorded. Paid search fares somewhat better at ~59%.\n\nIssue 2: Organic traffic is may be being misclassified as Direct\n\nShopify's tracking runs in a restricted environment that cannot detect where a visitor came from (the \"referrer\"). For paid traffic this doesn't matter - paid links carry tracking codes (UTMs) in the URL itself. But organic search traffic (e.g. someone clicking a Google result) has no such codes, so when the referrer is stripped, those visits look identical to someone typing the URL directly.\n\nThe result is that Direct traffic appears inflated, while Organic traffic appears lower than it really is. The visits are still being counted - they are just labelled under the wrong channel. It's worth flagging here that Direct looks inflated by more than just the loss in Organic traffic, so sessions from other channels may be being classed as Direct too.\n\nNext steps\n\nWe are investigating the above with Dept. However, if there are Shopify limitations, some of these limitations may not be fully solvable, and there is a realistic possibility that post-migration session data will represent a \"new normal\" with lower recorded volumes and some channel misattribution compared to the pre-migration baseline. We will provide updates as our evaluation progresses.\n\nUpdate (10 Jul 2026): This investigation is ongoing. Dept are currently carrying out an audit of our tracking setup and are hoping to provide recommended actions we can take to improve the accuracy of session tracking. We will update once their findings are available.",

            detail: "App checkout orders are absent from attribution reporting - potential fix under evaluation.",

                rows: [
                    ["App session conversion rate",             "Accurate",           "Crashes toward 0",                                   "bad:App orders missing from attribution - looks like app stopped converting"],
                    ["App funnel (browse → checkout → purchase)", "Connected end-to-end", "Drops off before checkout",                      "bad:Checkout step is invisible to reporting"],
                    ["Revenue attributed to App channel",       "Accurate",           "Underreported",                                      "bad:App loses credit for purchases it generated"],
                    ["Web session count",                       "Normal",             "Not inflated (earlier concern ruled out)",             "good:No double-counting occurring"],
                ],
            },
            body: "What's happening\n\nWhen a customer shops in the iOS app, the checkout step opens inside a Shopify web page embedded within the app. Our investigation has found that Shopify's tracking does not fire at all inside this embedded checkout - no events are recorded for the checkout journey.\n\nThis is actually simpler than we originally feared. Our earlier concern was that the checkout would create a second, phantom session that would inflate web session counts and misattribute revenue to other channels. That is not happening - because no tracking fires at all, there is no double-counting issue.\n\nHowever, the consequence is that orders placed through the app checkout are completely absent from session-based reporting. They are not misattributed to the wrong channel - they are simply missing from attribution altogether. This is why the app's conversion rate appears to collapse: the browsing sessions are recorded, but the resulting purchases are invisible to the reporting system.\n\nPotential fix\n\nOne option we are evaluating is to change the source of order data in our reporting pipeline. Currently, orders are detected via Shopify's browser-based tracking, which (as described above) doesn't work for app checkouts. An alternative approach would be to use the authoritative order records from Shopify's back-end systems instead, which capture every order regardless of how the customer checked out.\n\nThis would involve linking orders back to browsing sessions using the customer's account and the timing of their activity. Since app users are always logged in, this should be feasible - but we are still assessing the approach and any trade-offs before committing to it.\n\nOn the positive side, the earlier concern about double-counted sessions has been ruled out, so no historical cleanup would be needed on that front. We will provide updates as our evaluation progresses.",
        },
        {
            severity: "low",

            body: "What's happening\n\nApproximately 5.5% of products in Shopify have incorrect category labels (e.g. category fields containing values like \"Black Friday 20% Off\" rather than a genuine product category such as \"Skincare\" or \"Moisturisers\"). These category fields are used to segment reporting by product type, so incorrect values will cause some products to appear under the wrong category or in nonsensical groupings in dashboards and reports.\n\nUpdate (7 Jul 2026): The incorrect category data has been rectified in Shopify and the corrected data has been imported into Snowflake. When our main processing run happens tomorrow morning, the corrected categories should flow through to Lightdash and this issue will be resolved.\n\nUpdate (10 Jul 2026): The bulk of the corrections have flowed through successfully. Only 38 products still have incorrect categories. We will tidy up the remaining few on Monday 13 Jul, after which this issue should be fully resolved.",
        },
        {

        {

            body: "Historically, Average Units per Order (AUO) has been calculated by exploding kit products into their individual component units before counting. This means a kit containing three items would contribute 3 to the unit count rather than 1.\n\nIn the new Lightdash project, kits are not yet being exploded. AUO is currently calculated based on the number of products sold, treating each kit as a single unit. Given that membership kits now represent a significant share of orders, this is likely to have a material impact on AUO figures.\n\nPlease bear this in mind when reviewing AUO in the new Lightdash project, and avoid direct comparisons with historical AUO figures until this is resolved.\n\nUpdate (10 Jul 2026): A fix for this issue is ready and will be deployed on Monday 13 Jul. Once live, kits will be correctly exploded into individual component units and AUO figures should align with the historical methodology.",

            tiles: [
                { name: "Total Member Snapshot - Count Active At End Of Day", migrated: true },
                { name: "Acquired Members - Split By Term", migrated: true },
                { name: "Acquired Members - Split by Join/Rejoin", migrated: true },
                { name: "All Membership Base Non-Passive Events", migrated: true },
                { name: "Net Paid Membership Base", migrated: true },
                { name: "Paid Membership Base Non-Passive Events", migrated: true },
                { name: "Rejoining Members - Split By Paid/Unpaid", migrated: true },
                { name: "Joining Members - Split by Paid/Unpaid", migrated: true },
                { name: "Churning Members - Split By Paid/Unpaid", migrated: true },
            ]
        },
    ]
};

// ── HELPERS ─────────────────────────────────────────────────────────────

function tileStats(dashboard) {
    const tiles = dashboard.tiles;
    const migrated = tiles.filter(t => t.migrated === true).length;
    const wontdo = tiles.filter(t => t.migrated === "wontdo").length;
    const pending = tiles.filter(t => t.migrated === false).length;
    const total = tiles.length;
    const resolved = migrated + wontdo;
    const pct = total ? Math.round((resolved / total) * 100) : 0;
    return { migrated, wontdo, pending, total, resolved, pct };
}

function getProgressClass(pct) {
    if (pct >= 100) return "progress-complete";
    if (pct >= 66)  return "progress-high";
    if (pct >= 33)  return "progress-mid";
    if (pct > 0)    return "progress-low";
    return "progress-none";
}

function dashboardStatus(d) {
    if (d.wontdo) return "wontdo";
    const s = tileStats(d);
    if (s.resolved === s.total) return "complete";
    if (s.resolved === 0) return "notstarted";
    return "inprogress";
}

// ── RENDERING ───────────────────────────────────────────────────────────

function render() {
    const list = document.getElementById("dashboardList");
    const summary = document.getElementById("summary");

    let totalTiles = 0;
    let totalMigrated = 0;
    let totalWontdo = 0;
    let completedDashboards = 0;
    let wontdoDashboards = 0;

    DATA.dashboards.forEach(d => {
        const s = tileStats(d);
        totalTiles += s.total;
        totalMigrated += s.migrated;
        totalWontdo += s.wontdo;
        if (d.wontdo) { wontdoDashboards++; }
        else if (s.resolved === s.total) { completedDashboards++; }
    });

    const activeDashboards = DATA.dashboards.length - wontdoDashboards;
    const activeTiles = totalTiles - totalWontdo;
    const overallPct = activeTiles ? Math.round((totalMigrated / activeTiles) * 100) : 0;

    summary.innerHTML = `
        <div class="summary-card">
            <div class="label">Dashboards</div>
            <div class="value">${completedDashboards} / ${activeDashboards}</div>
        </div>
        <div class="summary-card">
            <div class="label">Tiles Migrated</div>
            <div class="value">${totalMigrated} / ${activeTiles}</div>
        </div>
        <div class="summary-card">
            <div class="label">Overall Progress</div>
            <div class="value">${overallPct}%</div>
        </div>
        <div class="summary-card">
            <div class="label">Deprecated</div>
            <div class="value small">${wontdoDashboards} dashboard${wontdoDashboards !== 1 ? 's' : ''}<br>${totalWontdo} tile${totalWontdo !== 1 ? 's' : ''}</div>
        </div>
    `;

    list.innerHTML = "";

    // Sort: in-progress first, then complete, then not started, then deprecated
    const sortOrder = { inprogress: 0, complete: 1, wontdo: 2, notstarted: 3 };
    const sorted = [...DATA.dashboards].sort((a, b) => {
        const statusA = dashboardStatus(a);
        const statusB = dashboardStatus(b);
        if (sortOrder[statusA] !== sortOrder[statusB]) {
            return sortOrder[statusA] - sortOrder[statusB];
        }
        return tileStats(b).pct - tileStats(a).pct;
    });

    sorted.forEach(d => {
        const s = tileStats(d);
        const migratedPct = s.total ? (s.migrated / s.total) * 100 : 0;
        const wontdoPct = s.total ? (s.wontdo / s.total) * 100 : 0;

        const row = document.createElement("div");
        row.className = "dashboard-row";

        const dashboardBadge = d.wontdo
            ? `<span class="dashboard-badge badge-wontdo">DEPRECATED</span>`
            : "";

        const dashboardNote = d.note
            ? `<div class="tile-note" style="margin: 0.5rem 0">${d.note}</div>`
            : "";

        row.innerHTML = `
            <div class="dashboard-header" onclick="this.parentElement.classList.toggle('expanded')">
                <span class="chevron">&#9654;</span>
                <span class="dashboard-name">${d.name}${dashboardBadge}</span>
                <div class="progress-bar-container">
                    ${migratedPct > 0 ? `<div class="progress-bar-fill progress-migrated" style="width:${migratedPct}%"></div>` : ""}
                    ${wontdoPct > 0 ? `<div class="progress-bar-fill progress-wontdo" style="width:${wontdoPct}%"></div>` : ""}
                </div>
                <span class="progress-label">${s.resolved}/${s.total}</span>
            </div>
            <div class="tile-list">
                ${dashboardNote}
                ${(() => {
                    let html = "";
                    let currentTab = null;
                    const hasTabs = d.tiles.some(t => t.tab);
                    d.tiles.forEach(t => {
                        if (hasTabs && t.tab !== currentTab) {
                            currentTab = t.tab;
                            html += `<div class="tab-header">${currentTab}</div>`;
                        }
                        const isWontdo = t.migrated === "wontdo";
                        const isDone = t.migrated === true;
                        const statusClass = isWontdo ? "wontdo" : isDone ? "done" : "pending";
                        const icon = isDone ? "✓" : isWontdo ? "✕" : "";
                        const nameClass = isWontdo ? "wontdo" : isDone ? "" : "pending";
                        const note = t.note ? `<div class="tile-note">${t.note}</div>` : "";
                        html += `
                            <div class="tile-item">
                                <span class="tile-status ${statusClass}">${icon}</span>
                                <div class="tile-content">
                                    <span class="tile-name ${nameClass}">${t.name}</span>
                                    ${note}
                                </div>
                            </div>
                        `;
                    });
                    return html;
                })()}
            </div>
        `;
        list.appendChild(row);
    });

    const d = new Date(DATA.lastUpdated);
    const formatted = d.toLocaleString(undefined, { dateStyle: "medium", timeStyle: "medium" });
    document.getElementById("lastUpdated").textContent = `Last updated: ${formatted}`;

    // ── RECENT UPDATES BANNER ────────────────────────────────────────────
    const updates = DATA.recentUpdates || [];
    const bannerEl = document.getElementById("updatesBanner");
    if (updates.length > 0) {
        const groupsHtml = updates.map(group => {
            const dateLabel = new Date(group.date + "T00:00:00").toLocaleDateString(undefined, { day: "numeric", month: "long", year: "numeric" });
            const itemsHtml = group.items.map(item => `<li>${item}</li>`).join("");
            return `<div class="updates-group"><div class="updates-group-date">${dateLabel}</div><ul class="updates-group-items">${itemsHtml}</ul></div>`;
        }).join("");
        bannerEl.innerHTML = `<div class="updates-banner"><div class="updates-banner-header" onclick="const b=this.nextElementSibling;const t=this.querySelector('.updates-banner-toggle');b.style.display=b.style.display==='none'?'':'none';t.textContent=b.style.display==='none'?'Show':'Hide';"><span class="updates-banner-title">What\u2019s new</span><span class="updates-banner-toggle">Hide</span></div><div class="updates-banner-body">${groupsHtml}</div></div>`;
    } else {
        bannerEl.innerHTML = "";
    }

    // ── DATA ISSUES SIDEBAR ──────────────────────────────────────────────
    const issues = DATA.dataIssues || [];
    const issuesCount = document.getElementById("issuesCount");
    const issuesList = document.getElementById("issuesList");

    issuesCount.textContent = issues.length;
    issuesCount.className = "issues-count" + (issues.length === 0 ? " zero" : "");

    if (issues.length === 0) {
        issuesList.innerHTML = `<div class="issues-empty">No known issues</div>`;
    } else {
        issuesList.innerHTML = `<div class="issues-list">${issues.map((issue, i) => {
            const severityClass = `severity-${issue.severity || "medium"}`;
            const severityLabel = (issue.severity || "medium").toUpperCase();
            const detail = issue.detail ? `<div class="issue-detail">${issue.detail}</div>` : "";
            const resolvedClass = issue.severity === "resolved" ? " resolved" : "";
            return `
                <a class="issue-item-link" href="#issue/${i}">
                    <div class="issue-item${resolvedClass}">
                        <div class="issue-item-header">
                            <span class="issue-severity ${severityClass}">${severityLabel}</span>
                            <span class="issue-title">${issue.title}</span>
                        </div>
                        ${detail}
                    </div>
                </a>`;
        }).join("")}</div>`;
    }
}

// ── ROUTING ──────────────────────────────────────────────────────────────
function renderIssuePage(index) {
    const issue = (DATA.dataIssues || [])[index];
    if (!issue) { location.hash = ""; return; }

    const severityClass = `severity-${issue.severity || "medium"}`;
    const severityLabel = (issue.severity || "medium").toUpperCase();
    const affected = issue.affectedDashboards && issue.affectedDashboards.length
        ? `<div>Affects: ${issue.affectedDashboards.join(", ")}</div>` : "";
    const body = issue.body
        ? `<div class="issue-detail-body">${issue.body}</div>` : "";

    let table = "";
    if (issue.table) {
        const headers = issue.table.headers.map(h => `<th>${h}</th>`).join("");
        const rows = issue.table.rows.map(row => {
            const cells = row.map((cell, i) => {
                let cls = "";
                let text = cell;
                if (typeof cell === "string" && cell.startsWith("bad:"))  { cls = " class=\"cell-bad\"";  text = cell.slice(4); }
                if (typeof cell === "string" && cell.startsWith("good:")) { cls = " class=\"cell-good\""; text = cell.slice(5); }
                if (!text) cls = " class=\"cell-muted\"", text = "-";
                return `<td${cls}>${text}</td>`;
            }).join("");
            return `<tr>${cells}</tr>`;
        }).join("");
        table = `
            <div class="issue-detail-table-wrap">
                <div class="issue-detail-table-label">Impact comparison</div>
                <table class="issue-table">
                    <thead><tr>${headers}</tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
    }

    document.getElementById("issueDetailCard").innerHTML = `
        <span class="issue-detail-severity ${severityClass}">${severityLabel}</span>
        <div class="issue-detail-title">${issue.title}</div>
        <div class="issue-detail-meta">
            ${issue.detail ? `<div>${issue.detail}</div>` : ""}
            ${affected}
        </div>
        ${table}
        ${body}
    `;
}

function route() {
    const hash = location.hash;
    const match = hash.match(/^#issue\/(\d+)$/);
    const mainView = document.getElementById("mainView");
    const issuePage = document.getElementById("issuePage");

    if (match) {
        renderIssuePage(parseInt(match[1], 10));
        mainView.classList.add("hidden");
        issuePage.classList.add("active");
        window.scrollTo(0, 0);
    } else {
        mainView.classList.remove("hidden");
        issuePage.classList.remove("active");
    }
}

window.addEventListener("hashchange", route);
render();
route();
</script>
